<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | VITES Designs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&family=Outfit:wght@700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/premium-login.css">
</head>

<body>
    <!-- TICKER -->
    <div class="ticker-wrap">
        <span class="ticker-text">✨ Secure Admin Portal &nbsp;|&nbsp; Authorized Personnel Only &nbsp;|&nbsp; VITES
            Designs Management System ✨</span>
    </div>

    <div class="bg-circle bg-circle-1"></div>
    <div class="bg-circle bg-circle-2"></div>
    <div class="bg-circle bg-circle-3"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <img src="img/logovts.png" alt="VITES Designs Logo">
                <h2>VITES Designs</h2>
                <p>Admin Portal — Authorized Access Only</p>
            </div>

            <div class="lock-icon"><i class="fas fa-lock"></i></div>

            <div class="error-msg" id="errorMsg">
                <i class="fas fa-exclamation-circle me-2"></i><span id="errorText">Invalid username or password!</span>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fas fa-envelope"></i></span>
                        <input type="email" class="form-control border-start-0" id="email"
                            placeholder="admin@vitesdesigns.com" required style="border-radius:0 12px 12px 0;">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text border-end-0"><i class="fas fa-key"></i></span>
                        <input type="password" class="form-control border-start-0 border-end-0" id="password"
                            placeholder="Enter password" required style="border-radius:0;">
                        <span class="input-group-text border-start-0 toggle-pw" onclick="togglePassword()"
                            style="border-radius:0 12px 12px 0; cursor:pointer;"><i class="fas fa-eye"
                                id="eyeIcon"></i></span>
                    </div>
                </div>
                <button type="submit" class="btn btn-login mb-3" id="loginBtn">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In to Admin
                </button>
            </form>

            <div class="text-center d-flex justify-content-between px-2">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left me-1"></i>Back to Website</a>
                <a href="admin-register.html" class="back-link" style="color: #FFD700;"><i
                        class="fas fa-user-plus me-1"></i>Register New Admin</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAEmMwAgeAsu6X0M94CWJ9hZEKJMXhMNDM",
            authDomain: "web-design-bfa0e.firebaseapp.com",
            projectId: "web-design-bfa0e",
            storageBucket: "web-design-bfa0e.firebasestorage.app",
            messagingSenderId: "975321654653",
            appId: "1:975321654653:web:647139d738d865ff2f9814",
            measurementId: "G-FWKYQQJTPH"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const err = document.getElementById('errorMsg');
            const errText = document.getElementById('errorText');
            const btn = document.getElementById('loginBtn');

            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Signing In...';
            btn.disabled = true;
            err.style.display = 'none';

            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    sessionStorage.setItem('vitesAdminLoggedIn', 'true');
                    sessionStorage.setItem('vitesAdminUser', email);
                    window.location.href = 'admin.html';
                })
                .catch((error) => {
                    btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Sign In to Admin';
                    btn.disabled = false;
                    err.style.display = 'block';
                    errText.textContent = error.message;
                });
        });

        function togglePassword() {
            const pw = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pw.type === 'password') { pw.type = 'text'; icon.className = 'fas fa-eye-slash'; }
            else { pw.type = 'password'; icon.className = 'fas fa-eye'; }
        }
    </script>
</body>

</html>
